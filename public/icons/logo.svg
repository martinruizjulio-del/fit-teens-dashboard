<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Logo CFS - Condición Física Secundaria">
  <title>CFS — Cronómetro + Pulso</title>
  <!-- Botón superior del cronómetro -->
  <rect x="28" y="4" width="8" height="5" rx="1.5" fill="#0E2E5C"/>
  <!-- Asas laterales -->
  <rect x="22" y="7" width="4" height="3" rx="1" fill="#0E2E5C"/>
  <rect x="38" y="7" width="4" height="3" rx="1" fill="#0E2E5C"/>
  <!-- Cuerpo del cronómetro -->
  <circle cx="32" cy="36" r="23" fill="none" stroke="#0E2E5C" stroke-width="3"/>
  <!-- Anillo de progreso -->
  <circle cx="32" cy="36" r="23" fill="none" stroke="#F26A1F" stroke-width="3" stroke-linecap="round" stroke-dasharray="40 200" transform="rotate(-90 32 36)"/>
  <!-- Marcas horarias -->
  <line x1="32" y1="15" x2="32" y2="18" stroke="#0E2E5C" stroke-width="2" stroke-linecap="round"/>
  <line x1="53" y1="36" x2="50" y2="36" stroke="#0E2E5C" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="57" x2="32" y2="54" stroke="#0E2E5C" stroke-width="2" stroke-linecap="round"/>
  <line x1="11" y1="36" x2="14" y2="36" stroke="#0E2E5C" stroke-width="2" stroke-linecap="round"/>
  <!-- Onda ECG -->
  <polyline points="14,36 22,36 26,36 28,30 31,42 34,24 37,42 40,36 50,36" fill="none" stroke="#F26A1F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
