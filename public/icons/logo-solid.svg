<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Logo CFS sobre fondo sólido">
  <title>CFS — Cronómetro + Pulso (sólido)</title>
  <rect width="64" height="64" rx="12" fill="#0E2E5C"/>
  <!-- Botón superior del cronómetro -->
  <rect x="28" y="6" width="8" height="5" rx="1.5" fill="#FFFFFF"/>
  <rect x="22" y="9" width="4" height="3" rx="1" fill="#FFFFFF"/>
  <rect x="38" y="9" width="4" height="3" rx="1" fill="#FFFFFF"/>
  <!-- Cuerpo -->
  <circle cx="32" cy="37" r="21" fill="none" stroke="#FFFFFF" stroke-width="2.8"/>
  <!-- Anillo progreso -->
  <circle cx="32" cy="37" r="21" fill="none" stroke="#F26A1F" stroke-width="2.8" stroke-linecap="round" stroke-dasharray="36 200" transform="rotate(-90 32 37)"/>
  <!-- Marcas -->
  <line x1="32" y1="18" x2="32" y2="21" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="51" y1="37" x2="48" y2="37" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="32" y1="56" x2="32" y2="53" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="13" y1="37" x2="16" y2="37" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <!-- ECG -->
  <polyline points="15,37 22,37 26,37 28,31 31,43 34,25 37,43 40,37 49,37" fill="none" stroke="#F26A1F" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
